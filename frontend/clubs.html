<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clubs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f8f9fa; }

        .card {
            border-radius: 15px;
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Clubs</span>
    </div>
</nav>

<div class="container mt-4">
    <div class="row" id="clubsContainer"></div>
</div>

<script src="api.js"></script>

<script>
async function loadClubs() {
    try {
        const clubs = await window.api.getClubs();

        const container = document.getElementById("clubsContainer");
        container.innerHTML = "";

        clubs.forEach(club => {

            const date = new Date(club.session_date).toLocaleDateString();
            const time = club.session_time.slice(0,5);

            const card = `
                <div class="col-md-4 mb-4">
                    <div class="card shadow-sm p-3">

                        <h5>${club.name}</h5>

                        <p>${club.description}</p>

                        <p><strong>Date:</strong> ${date}</p>

                        <p><strong>Time:</strong> ${time}</p>

                        <p><strong>Location:</strong> ${club.location}</p>

                    </div>
                </div>
            `;

            container.innerHTML += card;
        });

    } catch (error) {
        console.error("Error loading clubs:", error);
    }
}

loadClubs();
</script>

</body>
</html>
