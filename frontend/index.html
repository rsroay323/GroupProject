<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Hub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .card {
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .card-img-top {
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            height: 180px;
            object-fit: cover;
        }

        h1 {
            font-weight: 600;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">Campus Hub</span>
            <button class="btn btn-danger" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container text-center mt-5">
        <h1 class="mb-4">University of Wolverhampton</h1>
    </div>

    <div class="container">
        <div class="row g-4">

            <div class="col-md-4">
                <div class="card shadow-sm h-100 text-center" onclick="openPage('clubs.html')">
                    <img src="images/club_image.jpg" class="card-img-top">
                    <div class="card-body">
                        <h5>Clubs</h5>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm h-100 text-center" onclick="openPage('events.html')">
                    <img src="images/events_image.jpg" class="card-img-top">
                    <div class="card-body">
                        <h5>Events</h5>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm h-100 text-center" onclick="openPage('facilities.html')">
                    <img src="images/facilities_image.jpg" class="card-img-top">
                    <div class="card-body">
                        <h5>Facilities</h5>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm h-100 text-center" onclick="openPage('transport.html')">
                    <img src="images/transport_image.jpg" class="card-img-top">
                    <div class="card-body">
                        <h5>Transport</h5>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm h-100 text-center" onclick="openPage('checkin.html')">
                    <img src="images/checkin_image.jpg" class="card-img-top">
                    <div class="card-body">
                        <h5>Check-In</h5>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm h-100 text-center" onclick="openPage('rewards.html')">
                    <img src="images/rewards_image.jpg" class="card-img-top">
                    <div class="card-body">
                        <h5>Rewards</h5>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>

        function logout() {
            localStorage.removeItem("loggedInUser");
            window.location.href = "createAccount.html";
        }
    if (!localStorage.getItem("loggedInUser")) {
    window.location.href = "createAccount.html";
    }

    function openPage(page) {
    window.location.href = window.location.origin + '/frontend/' + page;
    }

    function logout() {
    localStorage.removeItem("loggedInUser");
    window.location.href = "createAccount.html";
    }
    
</script>

</body>
</html>
