<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rewards</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f8f9fa;
}

.points-box{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    text-align:center;
}

h1{
    font-size:50px;
    margin:0;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<span class="navbar-brand">Rewards</span>
</div>
</nav>

<div class="container mt-5">

<div class="points-box">
    <h3>Your Reward Points</h3>
    <h1 id="points">0</h1>
</div>

</div>

<script>
function loadPoints(){
    const points = localStorage.getItem("points") || 0;
    document.getElementById("points").innerText = points;
}

loadPoints();
</script>

</body>
</html>
