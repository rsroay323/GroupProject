<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Events</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f8f9fa; }

.card{
    border-radius:15px;
    transition:0.2s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 20px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<span class="navbar-brand">Events</span>
</div>
</nav>

<div class="container mt-4">
<div class="row" id="eventsContainer"></div>
</div>

<script src="api.js"></script>

<script>

if(!localStorage.getItem("loggedInUser")){
    window.location.href = "createAccount.html";
}
function getUser(){
    return localStorage.getItem("loggedInUser");
}
function joinedEvents(){
    const user = getUser();
    return JSON.parse(localStorage.getItem(user + "_events")) || [];
}

function saveJoinedEvents(data){
    const user = getUser();
    localStorage.setItem(user + "_events", JSON.stringify(data));
}

function getPoints(){
    const user = getUser();
    return parseInt(localStorage.getItem(user + "_points")) || 0;
}

function setPoints(value){
    const user = getUser();
    localStorage.setItem(user + "_points", value);
}

function toggleJoinEvent(id){

    let joined = joinedEvents();
    let points = getPoints();

    if(joined.includes(id)){
        joined = joined.filter(x => x !== id);
        points -= 15;
    }else{
        joined.push(id);
        points += 15;
        alert("+15 Points");
    }

    saveJoinedEvents(joined);
    setPoints(points);

    loadEvents();
}

async function loadEvents(){

    const events = await window.api.getEvents();
    const joined = joinedEvents();

    const container = document.getElementById("eventsContainer");
    container.innerHTML = "";

    events.forEach(event => {

        const date = new Date(event.date).toLocaleDateString();
        const time = event.time.slice(0,5);

        let button = "";

        if(joined.includes(event.id)){
            button = `<button class="btn btn-danger mt-2" onclick="toggleJoinEvent(${event.id})">Leave</button>`;
        }else{
            button = `<button class="btn btn-success mt-2" onclick="toggleJoinEvent(${event.id})">Join</button>`;
        }

        const card = `
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm p-3">
                <h5>${event.title}</h5>
                <p><strong>Date:</strong> ${date}</p>
                <p><strong>Time:</strong> ${time}</p>
                ${button}
            </div>
        </div>
        `;

        container.innerHTML += card;
    });
}

loadEvents();

</script>

</body>
</html>
