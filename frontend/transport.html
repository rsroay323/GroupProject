<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Transport</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f8f9fa;
}
.card{
    border-radius:15px;
    transition:0.2s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 20px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<span class="navbar-brand">Transport</span>
</div>
</nav>

<div class="container mt-4">
<div class="row" id="transportContainer"></div>
</div>

<script src="api.js"></script>
<script>

if(!localStorage.getItem("loggedInUser")){
    window.location.href = "createAccount.html";
}

async function loadTransport(){
    const transport = await window.api.getTransport();
    const container =  document.getElementById("transportContainer");
    container.innerHTML = "";
    transport.forEach(bus => {

        let destination = "";
        if(bus.bus === "Bus 529"){
            destination = "City Campus → Walsall Campus";
        }else if(bus.bus === "Bus 51"){
            destination = "City Campus → Telford Campus";
        }
        const card = `
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm p-4 text-center">
            <h3>${bus.bus}</h3>
                <p class="fs-5">
                    Route: ${destination}
                </p>
            </div>
        </div>
        `;

        container.innerHTML += card;
    });
}
loadTransport();
</script>
</body>
</html>
