<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Account</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background:#f8f9fa;
}

.form-box {
    max-width:500px;
    margin:auto;
    margin-top:80px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>

<body>


<nav class="navbar navbar-dark bg-dark">
<div class="container">
<span class="navbar-brand">Create Account</span>
</div>
</nav>

<div class="container">
<div class="form-box">

<h3 class="mb-3 text-center">Sign Up</h3>
<input id="name" class="form-control mb-2" placeholder="Full Name">
<input id="email" class="form-control mb-2" placeholder="Email">
<input id="password" type="password" class="form-control mb-2" placeholder="Password">

<input id="confirmPassword" type="password" class="form-control mb-3" placeholder="Confirm Password">

<button class="btn btn-success w-100" onclick="register()">
    Create Account
</button>

<hr>

<p class="text-center mt-3">Already have an account?</p>

<button class="btn btn-outline-primary w-100" onclick="login()">
    Sign In
</button>

</div>
</div>

<script src="api.js"></script>

<script>

if(localStorage.getItem("loggedInUser")){
    window.location.href = "index.html";
}

async function register() {

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if(!name || !email || !password){
        alert("All fields required");
        return;
    }

    if(password !== confirmPassword){
        alert("Passwords do not match");
        return;
    }

    try {
        const res = await window.api.registerUser({
            name,
            email,
            password
        });

        if(res.detail){
            alert(res.detail);
        } else {

            localStorage.setItem("loggedInUser", email);
            localStorage.setItem(email + "_points", 0);
            localStorage.setItem(email + "_clubs", JSON.stringify([]));
            localStorage.setItem(email + "_events", JSON.stringify([]));
            localStorage.setItem(email + "_checkedFacilities", JSON.stringify([]));
            localStorage.setItem(email + "_lectureCheckin", JSON.stringify(false));

            alert("Account created");
            window.location.href = "index.html";
        }

    } catch {
        alert("Server error");
    }
}

async function login(){

    const email = prompt("Enter your email:");
    const password = prompt("Enter your password:");

    if(!email || !password){ alert("Enter email and password");
        return;
    }

    try {const res = await window.api.loginUser({
            email,
            password
        });

        if(res.detail){
            alert(res.detail);
        } else {localStorage.setItem("loggedInUser", email);
            alert("Logged in");
            window.location.href = "index.html";
        }

    } catch {

        alert("Login failed");
    }
}

</script>

</body>
</html>
