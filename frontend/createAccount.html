<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Account</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background:#f8f9fa;
}

.form-box {
    max-width:500px;
    margin:auto;
    margin-top:80px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>

<body>


<nav class="navbar navbar-dark bg-dark">
<div class="container">
<span class="navbar-brand">Create Account</span>
</div>
</nav>

<div class="container">
<div class="form-box">

<h3 class="mb-3 text-center">Sign Up</h3>
<input id="name" class="form-control mb-2" placeholder="Full Name">
<input id="email" class="form-control mb-2" placeholder="Email">
<input id="password" type="password" class="form-control mb-2" placeholder="Password">

<input id="confirmPassword" type="password" class="form-control mb-3" placeholder="Confirm Password">

<button class="btn btn-success w-100" onclick="register()">
    Create Account
</button>

</div>
</div>

<script src="api.js"></script>

<script>

async function register() {


    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if(!name || !email || !password){
        alert("All fields required");
        return;
    }

    if(password !== confirmPassword){
        alert("Passwords do not match");
        return;
    }

    try {

        const res = await window.api.registerUser({
            name,
            email,
            password
        });

        if(res.detail){
            alert(res.detail);
        } else {
            alert("Account created successfully!");

            document.getElementById("name").value = "";
            document.getElementById("email").value = "";
            document.getElementById("password").value = "";
            document.getElementById("confirmPassword").value = "";
        }

    } catch (err) {
        localStorage.setItem("loggedInUser", email);
        alert("Account created");
        window.location.href = "index.html";
    }
}

</script>

</body>
</html>
