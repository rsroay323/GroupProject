<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Facilities</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f8f9fa; }

        .card {
            border-radius: 15px;
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .status-open {
            color: green;
            font-weight: bold;
        }

        .status-closed {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Facilities</span>
    </div>
</nav>

<div class="container mt-4">
    <div class="row" id="facilitiesContainer"></div>
</div>

<script src="api.js"></script>

<script>
async function loadFacilities() {
    const facilities = await window.api.getFacilities();

    const container = document.getElementById("facilitiesContainer");
    container.innerHTML = "";

    facilities.forEach(facility => {

        const statusText = facility.status ? "Open" : "Closed";
        const statusClass = facility.status ? "status-open" : "status-closed";

        const openTime = facility.opening_time.slice(0,5);
        const closeTime = facility.closing_time.slice(0,5);

        const card = `
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm p-3">
                    <h5>${facility.name}</h5>
                    <p>${facility.description}</p>
                    <p><strong>Hours:</strong> ${openTime} - ${closeTime}</p>
                    <p class="${statusClass}">${statusText}</p>
                </div>
            </div>
        `;

        container.innerHTML += card;
    });
}

loadFacilities();
</script>

</body>
</html>
