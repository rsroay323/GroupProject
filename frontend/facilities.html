<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Facilities</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background-color:#f8f9fa; }

.card{
    border-radius:15px;
    transition:0.2s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.status-open{
    color:green;
    font-weight:bold;
}

.status-closed{
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<span class="navbar-brand">Facilities</span>
</div>
</nav>

<div class="container mt-4">
<div class="row" id="facilitiesContainer"></div>
</div>

<script src="api.js"></script>

<script>

function getPoints(){
    return parseInt(localStorage.getItem("points")) || 0;
}

function setPoints(value){
    localStorage.setItem("points", value);
}

let checkedFacilities = [];

function checkInFacility(id, name){

    const code = prompt(`Enter today's 4-digit code for ${name}`);

    if(code === null) return;

    if(code.length === 4 && !isNaN(code)){

        let points = getPoints();
        points += 20;
        setPoints(points);

        checkedFacilities.push(id);

        alert("+20 Points");

        loadFacilities();

    }else{
        alert("Invalid code");
    }
}

async function loadFacilities(){

    const facilities = await window.api.getFacilities();

    const container = document.getElementById("facilitiesContainer");
    container.innerHTML = "";

    facilities.forEach(facility => {

        const statusText = facility.status ? "Open" : "Closed";
        const statusClass = facility.status ? "status-open" : "status-closed";

        const openTime = facility.opening_time.slice(0,5);
        const closeTime = facility.closing_time.slice(0,5);

        let button = "";

        if(facility.status){

            if(checkedFacilities.includes(facility.id)){

                button = `
                <button class="btn btn-secondary mt-2" disabled>
                    Checked In
                </button>
                `;

            }else{

                button = `
                <button class="btn btn-success mt-2"
                onclick="checkInFacility(${facility.id}, '${facility.name}')">
                    Check In
                </button>
                `;
            }
        }

        const card = `
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm p-3">
                <h5>${facility.name}</h5>
                <p>${facility.description}</p>
                <p><strong>Hours:</strong> ${openTime} - ${closeTime}</p>
                <p class="${statusClass}">${statusText}</p>
                ${button}
            </div>
        </div>
        `;

        container.innerHTML += card;
    });
}

loadFacilities();

</script>
